      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /metrics/{username}/:
    get:
      operationId: metrics_retrieve
      parameters:
      - in: path
        name: username
        schema:
          type: string
        required: true
      tags:
