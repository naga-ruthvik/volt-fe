openapi: 3.0.3
info:
  title: ''
  version: 0.0.0
paths:
  /{username}/{platform_username}/{platform}/:
    get:
      operationId: root_retrieve
      parameters:
      - in: path
        name: platform
        schema:
          type: string
        required: true
      - in: path
        name: platform_username
        schema:
          type: string
        required: true
      - in: path
        name: username
        schema:
          type: string
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlatformList'
          description: ''
    put:
      operationId: root_update
      parameters:
      - in: path
        name: platform
        schema:
          type: string
        required: true
      - in: path
        name: platform_username
        schema:
          type: string
        required: true
      - in: path
        name: username
        schema:
          type: string
        required: true
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlatformUpdate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PlatformUpdate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PlatformUpdate'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlatformUpdate'
          description: ''
    patch:
      operationId: root_partial_update
      parameters:
      - in: path
        name: platform
        schema:
          type: string
        required: true
      - in: path
        name: platform_username
        schema:
          type: string
        required: true
      - in: path
        name: username
        schema:
          type: string
        required: true
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedPlatformUpdate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedPlatformUpdate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedPlatformUpdate'
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlatformUpdate'
          description: ''
    delete:
      operationId: root_destroy
      parameters:
      - in: path
        name: platform
        schema:
          type: string
        required: true
      - in: path
        name: platform_username
        schema:
          type: string
        required: true
      - in: path
        name: username
        schema:
          type: string
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '204':
          description: No response body
  /{username}/platforms/:
    get:
      operationId: platforms_list
      parameters:
      - in: path
        name: username
        schema:
          type: string
        required: true
      tags:
      - platforms
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PlatformList'
          description: ''
    post:
      operationId: platforms_create
      parameters:
      - in: path
        name: username
        schema:
          type: string
        required: true
      tags:
      - platforms
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlatformCreate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PlatformCreate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PlatformCreate'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlatformCreate'
          description: ''
  /activities/{username}/:
    get:
      operationId: activities_list
      parameters:
      - in: path
        name: username
        schema:
          type: string
        required: true
      tags:
      - activities
      security:
      - jwtAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ActivityList'
          description: ''
    post:
      operationId: activities_create
      parameters:
      - in: path
        name: username
        schema:
          type: string
        required: true
      tags:
      - activities
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActivityList'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ActivityList'
          multipart/form-data:
