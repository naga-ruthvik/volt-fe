components:
  schemas:
    ActivityList:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        platform:
          $ref: '#/components/schemas/PlatformEnum'
        activity_date:
          type: string
          format: date
        activity_count:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        metadata:
          nullable: true
      required:
      - activity_date
      - id
      - platform
    GenerateRequestsCreate:
      type: object
      properties:
        username:
          type: string
      required:
      - username
    PatchedPlatformUpdate:
      type: object
      properties:
        username:
          type: string
          maxLength: 100
    PlatformCreate:
      type: object
      properties:
        user:
          type: string
          format: uuid
        platform:
          $ref: '#/components/schemas/PlatformEnum'
        username:
          type: string
          maxLength: 100
      required:
      - platform
      - user
      - username
    PlatformEnum:
      enum:
      - codeforces
      - codechef
      - leetcode
      - hackerrank
      - github
      type: string
      description: |-
        * `codeforces` - Codeforces
        * `codechef` - CodeChef
        * `leetcode` - LeetCode
        * `hackerrank` - HackerRank
        * `github` - GitHub
    PlatformList:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        platform:
          $ref: '#/components/schemas/PlatformEnum'
        username:
          type: string
          maxLength: 100
      required:
      - id
      - platform
      - username
    PlatformUpdate:
      type: object
      properties:
        username:
          type: string
          maxLength: 100
      required:
      - username
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
